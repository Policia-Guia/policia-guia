<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de documento — PolicíaGuía</title>
  <link rel="stylesheet" href="css/styles.css?v=12" />
  <link rel="stylesheet" href="css/viewer.css?v=1" />
  <link rel="icon" type="image/jpeg" href="assets/logo-tonala.jpg" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo-tonala.jpg" alt="Policía Municipal Tonalá" class="brand-logo" />
        <span class="brand-text">Policía<strong>Guía</strong></span>
      </a>
      <a href="index.html" class="btn btn-ghost btn-sm">← Volver</a>
    </div>
  </header>

  <main class="viewer-page">
    <div class="container">

      <header class="viewer-header">
        <h1 id="doc-title">Documento</h1>
        <p id="doc-section" class="muted">Cargando…</p>
      </header>

      <div class="viewer-toolbar">
        <div class="toolbar-left">
          <span id="status" class="autosave-status">Cargando…</span>
        </div>
        <div class="toolbar-right">
          <a id="btn-download" href="#" class="btn btn-primary btn-sm" download>
            ⬇ Descargar para llenar
          </a>
        </div>
      </div>

      <!-- Índice rápido de secciones -->
      <nav id="quick-toc" class="quick-toc" hidden>
        <h3>Ir directamente a:</h3>
        <div id="toc-list" class="toc-list"></div>
      </nav>

      <!-- Estado de carga -->
      <div id="loading" class="loading-state">
        <div class="spinner"></div>
        <p>Cargando documento…</p>
      </div>

      <!-- Error -->
      <div id="error" class="error-state" hidden>
        <p>❌ <span id="error-msg">No se pudo cargar el documento.</span></p>
        <a href="index.html" class="btn btn-ghost btn-sm">← Volver al inicio</a>
      </div>

      <!-- Visor del DOCX -->
      <div id="docx-container" class="docx-container" hidden></div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <img src="assets/logo-tonala.jpg" alt="" class="brand-logo" />
        <span>Policía<strong>Guía</strong></span>
      </div>
      <small>© <span id="year"></span> PolicíaGuía</small>
    </div>
  </footer>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.5/dist/docx-preview.min.js"></script>
  <script src="js/viewer.js?v=1"></script>
</body>
</html>
